name: Build Insights-WebApp in Shared (Push Tag)

on:
  push:
    tags:
      - '*.*.*-develop'
      - '*.*.*-staging'
      - '*.*.*'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_latest: ${{ steps.setup.outputs.image_latest }}
      image_tag_latest: ${{ steps.setup.outputs.image_tag_latest }}
      environment: ${{ steps.setup.outputs.MANIFESTS_ENVIRONMENT }}
      tag: ${{ steps.setup.outputs.tag }}
    steps:
      - name: Set outputs
        id: setup
        run: |
          TAG="$( echo "${GITHUB_REF}" | cut -d'/' -f3 )"
          echo "tag=${TAG}" | tee -a "${GITHUB_OUTPUT}"
          if grep -qs -e '^.*.*-develop' <<< "${TAG}" ; then
            echo "Found environment: DEVELOP - ${TAG}"
            echo "MANIFESTS_ENVIRONMENT=develop" | tee -a "${GITHUB_OUTPUT}"
            export "MANIFESTS_ENVIRONMENT=develop"
          elif grep -qs -e '^.*.*-staging' <<< "${TAG}" ; then
            echo "Found environment: STAGING - ${TAG}"
            echo "MANIFESTS_ENVIRONMENT=staging" | tee -a "${GITHUB_OUTPUT}"
            export "MANIFESTS_ENVIRONMENT=staging"
          elif grep -qs -e '^.*.*' <<< "${TAG}" ; then
            echo "No environment found, assuming: PRODUCTION - ${TAG}"
            echo "MANIFESTS_ENVIRONMENT=production" | tee -a "${GITHUB_OUTPUT}"
            export "MANIFESTS_ENVIRONMENT=production"
          else
            echo 'Not a valid tag. Skipping...'
            exit 1
          fi
          echo "image_latest=${{ secrets.REGISTRY_ECR }}/insights:latest-${MANIFESTS_ENVIRONMENT}" | tee -a "${GITHUB_OUTPUT}"
          echo "image_tag_latest=latest-${MANIFESTS_ENVIRONMENT}" | tee -a "${GITHUB_OUTPUT}"

  build_assets:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      assets_image: ${{ secrets.REGISTRY_ECR }}/insights:webapp-assets-${{ needs.setup.outputs.tag }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        env:
          role_arn: ${{ secrets.ROLE_ARN }}
        if: env.role_arn != ''
        with:
          audience: sts.amazonaws.com
          role-session-name: ${{ github.run_id }}
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve VCS token
        id: vcs_token
        env:
          DEVOPS_TOKEN: ${{ secrets.DEVOPS_GITHUB_PERMANENT_TOKEN }}
        run: |
          if [ -n "${DEVOPS_TOKEN}" ]; then
            VCS_TOKEN="${DEVOPS_TOKEN}"
          else
            VCS_TOKEN="$(aws ssm get-parameter --with-decryption \
              --name "/cloud/github/TOKEN" \
              | jq -r .Parameter.Value)"
          fi
          if [ -z "${VCS_TOKEN}" ]; then
            echo "VCS token could not be resolved"
            exit 1
          fi
          echo "::add-mask::${VCS_TOKEN}"
          echo "token=${VCS_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download webapp secret
        uses: actions/checkout@v4
        with:
          ref: main
          repository: weni-ai/webapp-secret
          token: ${{ steps.vcs_token.outputs.token }}
          path: ./webapp-secret/

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_ECR }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build args
        id: build_args
        run: |
          ENV_FILE="webapp-secret/insights-webapp/${{ needs.setup.outputs.environment }}/env"
          if [ -r "${ENV_FILE}" ]; then
            {
              echo 'args<<EOFenv'
              sed -e '/^#/d' -e '/^\s*$/d' "${ENV_FILE}"
              echo EOFenv
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Build and push assets image
        id: assets
        uses: docker/build-push-action@v6
        with:
          provenance: false
          file: docker/Dockerfile.assets
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.REGISTRY_ECR }}/insights:webapp-assets-${{ needs.setup.outputs.tag }}
          build-args: |
            ${{ steps.build_args.outputs.args }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_ECR }}/insights:buildcache-assets
          cache-to: type=registry,ref=${{ secrets.REGISTRY_ECR }}/insights:buildcache-assets,mode=max

  call-workflow:
    uses: weni-ai/actions-workflows/.github/workflows/reusable-workflow.yaml@main
    needs:
      - setup
      - build_assets
    with:
      image_repository: insights
      image_tags: |
        type=ref,event=tag
        type=raw,${{ needs.setup.outputs.image_tag_latest }}
      image_tag_prefix: "webapp-"
      dockerfile: "docker/Dockerfile"
      build_args: |
        OLD_IMAGE=869898323958.dkr.ecr.us-east-1.amazonaws.com/insights:webapp-${{ needs.setup.outputs.image_tag_latest }}
        ASSETS_IMAGE=${{ needs.build_assets.outputs.assets_image }}
      target_repository: weni-ai/kubernetes-manifests-chats
      target_repository_branch: main
      target_application: insights-webapp
      target_patch_file: deployment.json
      kludge_webapp_secret_enable: true
    secrets: inherit
