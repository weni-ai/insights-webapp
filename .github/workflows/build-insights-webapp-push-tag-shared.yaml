name: Build Insights-WebApp in Shared (Push Tag)

on:
  push:
    tags:
      - "*.*.*-develop"
      - "*.*.*-staging"
      - "*.*.*"

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "18.19.1"
  AWS_REGION: us-east-1

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_latest: ${{ steps.setup.outputs.image_latest }}
      image_tag_latest: ${{ steps.setup.outputs.image_tag_latest }}
      deploy_environment: ${{ steps.setup.outputs.deploy_environment }}
    steps:
      - name: Set outputs
        id: setup
        run: |
          TAG="$( echo "${GITHUB_REF}" | cut -d'/' -f3 )"
          if grep -qs -e '^.*.*-develop' <<< "${TAG}" ; then
            echo "Found environment: DEVELOP - ${TAG}"
            echo "deploy_environment=develop" | tee "${GITHUB_OUTPUT}"
            export "MANIFESTS_ENVIRONMENT=develop"
          elif grep -qs -e '^.*.*-staging' <<< "${TAG}" ; then
            echo "Found environment: STAGING - ${TAG}"
            echo "deploy_environment=staging" | tee -a "${GITHUB_OUTPUT}"
            export "MANIFESTS_ENVIRONMENT=staging"
          elif grep -qs -e '^.*.*' <<< "${TAG}" ; then
            echo "No environment found, assuming: PRODUCTION - ${TAG}"
            echo "deploy_environment=production" | tee -a "${GITHUB_OUTPUT}"
            export "MANIFESTS_ENVIRONMENT=production"
          else
            echo 'Not a valid tag. Skipping...'
            exit 1
          fi
          echo "image_latest=${{ secrets.REGISTRY_ECR }}/insights:latest-${MANIFESTS_ENVIRONMENT}" | tee -a "${GITHUB_OUTPUT}"
          echo "image_tag_latest=latest-${MANIFESTS_ENVIRONMENT}" | tee -a "${GITHUB_OUTPUT}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        env:
          role_arn: ${{ secrets.ROLE_ARN }}
        if: env.role_arn != ''
        with:
          audience: sts.amazonaws.com
          role-session-name: ${{ github.run_id }}
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve VCS token
        id: vcs
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: |
          VCS_TOKEN=$(
            if [ -n "${{ secrets.DEVOPS_GITHUB_PERMANENT_TOKEN }}" ]; then
              printf '%s' "${{ secrets.DEVOPS_GITHUB_PERMANENT_TOKEN }}"
            elif [ -n "${{ secrets.ROLE_ARN }}" ]; then
              aws ssm get-parameter --with-decryption \
                --name "/cloud/github/TOKEN" \
                | jq -r .Parameter.Value
            fi
          )
          if [ -z "${VCS_TOKEN}" ]; then
            echo "VCS token could not be resolved from DEVOPS_GITHUB_PERMANENT_TOKEN or AWS SSM"
            exit 1
          fi
          echo "::add-mask::${VCS_TOKEN}"
          echo "token=${VCS_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Download webapp secret
        uses: actions/checkout@v4
        with:
          ref: main
          repository: weni-ai/webapp-secret
          token: ${{ steps.vcs.outputs.token }}
          path: ./webapp-secret/

      - name: Upload webapp secret
        uses: actions/upload-artifact@v4
        with:
          name: webapp-secret
          path: ./webapp-secret/
          retention-days: 1

  frontend-build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Download webapp secret
        uses: actions/download-artifact@v4
        with:
          name: webapp-secret
          path: ./webapp-secret/

      - name: Load build environment variables
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          ENV_FILE="./webapp-secret/${REPO_NAME}/${{ needs.setup.outputs.deploy_environment }}/env"
          if [ -r "${ENV_FILE}" ]; then
            grep -vE '^\s*(#|$)' "${ENV_FILE}" >> "${GITHUB_ENV}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            libjpeg-dev \
            libpango1.0-dev \
            libgif-dev \
            build-essential \
            g++

      - name: Install npm dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  call-workflow:
    uses: ./.github/workflows/reusable-insights-webapp-build.yaml
    needs:
      - setup
      - frontend-build
    with:
      image_repository: insights
      image_tags: |
        type=ref,event=tag
        type=raw,${{ needs.setup.outputs.image_tag_latest }}
      image_tag_prefix: "webapp-"
      dockerfile: "docker/Dockerfile.runtime"
      frontend_artifact_name: dist
      build_args: |
        OLD_IMAGE=869898323958.dkr.ecr.us-east-1.amazonaws.com/insights:webapp-${{ needs.setup.outputs.image_tag_latest }}
      target_repository: weni-ai/kubernetes-manifests-chats
      target_repository_branch: main
      target_application: insights-webapp
      target_patch_file: deployment.json
      kludge_webapp_secret_enable: true
    secrets: inherit
